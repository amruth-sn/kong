model:
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072

training:
  epochs: 10
  batch_size: 64
  learning_rate: 1.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  mask_probability: 0.20
  mask_token_ratio: 0.50
  max_length: 514
  fp16: true

data:
  window_size: 512
  stride: 256

output:
  save_every_n_epochs: 2
  checkpoint_dir: checkpoints/pretrain
